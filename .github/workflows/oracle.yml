name: Oracle ARM Instance Creator

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: oracle-creator
  cancel-in-progress: false

jobs:
  create-instance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write private key
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Write OCI config
        run: |
          mkdir -p $HOME/.oci
          echo "[DEFAULT]" > $HOME/.oci/config
          echo "user=${{ secrets.OCI_USER }}" >> $HOME/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> $HOME/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY }}" >> $HOME/.oci/config
          echo "region=${{ secrets.OCI_REGION }}" >> $HOME/.oci/config
          echo "key_file=${{ github.workspace }}/private_key.pem" >> $HOME/.oci/config
          chmod 600 $HOME/.oci/config

      - name: Generate SSH key for instance
        run: |
          mkdir -p $HOME/.ssh
          ssh-keygen -t rsa -b 2048 -f $HOME/.ssh/oci_key -N ""

      - name: Send SSH private key to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import os, urllib.request, json
          token = os.environ['TELEGRAM_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          key = open(os.path.expanduser('~/.ssh/oci_key')).read()
          msg = '🔑 SSH Private Key:\n\n' + key + '\n\nSave this! You need it to SSH in.'
          data = json.dumps({'chat_id': chat_id, 'text': msg}).encode()
          req = urllib.request.Request(
              f'https://api.telegram.org/bot{token}/sendMessage',
              data=data,
              headers={'Content-Type': 'application/json'}
          )
          urllib.request.urlopen(req)
          print('Key sent to Telegram')
          "

      - name: Create cloud-init script
        run: |
          cat > /tmp/cloud-init.sh << 'CLOUDINIT'
#!/bin/bash
iptables -F
iptables -P INPUT ACCEPT
iptables -P OUTPUT ACCEPT
iptables -P FORWARD ACCEPT
ip6tables -F
ip6tables -P INPUT ACCEPT
ip6tables -P OUTPUT ACCEPT
ip6tables -P FORWARD ACCEPT
DEBIAN_FRONTEND=noninteractive apt-get install -y iptables-persistent netfilter-persistent
netfilter-persistent save
systemctl enable netfilter-persistent
CLOUDINIT
          base64 -w 0 /tmp/cloud-init.sh > /tmp/cloud-init-b64.txt
          echo "CLOUD_INIT_DATA=$(cat /tmp/cloud-init-b64.txt)" >> $GITHUB_ENV

      - name: Write oci.env
        run: |
          echo "OCI_CONFIG=$HOME/.oci/config" > oci.env
          echo "OCI_USER=${{ secrets.OCI_USER }}" >> oci.env
          echo "OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}" >> oci.env
          echo "OCI_TENANCY=${{ secrets.OCI_TENANCY }}" >> oci.env
          echo "OCI_REGION=${{ secrets.OCI_REGION }}" >> oci.env
          echo "OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}" >> oci.env
          echo "OCT_FREE_AD=${{ secrets.OCI_AD }}" >> oci.env
          echo "OCI_COMPUTE_SHAPE=VM.Standard.A1.Flex" >> oci.env
          echo "OPERATING_SYSTEM=Canonical Ubuntu" >> oci.env
          echo "OS_VERSION=24.04" >> oci.env
          echo "OCI_OCPUS=4" >> oci.env
          echo "OCI_MEMORY_IN_GBS=24" >> oci.env
          echo "BOOT_VOLUME_SIZE=150" >> oci.env
          echo "REQUEST_WAIT_TIME_SECS=120" >> oci.env
          echo "ASSIGN_PUBLIC_IP=true" >> oci.env
          echo "DISPLAY_NAME=my-arm-instance" >> oci.env
          echo "SECOND_MICRO_INSTANCE=False" >> oci.env
          echo "NOTIFY_EMAIL=False" >> oci.env
          echo "EMAIL=" >> oci.env
          echo "EMAIL_PASSWORD=" >> oci.env
          echo "DISCORD_WEBHOOK=" >> oci.env
          echo "SSH_AUTHORIZED_KEYS_FILE=$HOME/.ssh/oci_key.pub" >> oci.env
          echo "OCI_IMAGE_ID=" >> oci.env
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> oci.env
          echo "TELEGRAM_USER_ID=${{ secrets.TELEGRAM_USER_ID }}" >> oci.env
          echo "USER_DATA=${{ env.CLOUD_INIT_DATA }}" >> oci.env

      - name: Write telegram script
        run: |
          cat > tg.py << 'PYEOF'
          import sys
          import os
          import urllib.request
          import json
          token = os.environ.get("TELEGRAM_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          msg = sys.stdin.read()[:4000]
          msg = msg.encode("ascii", "ignore").decode("ascii")
          if token and chat_id:
              try:
                  data = json.dumps({"chat_id": chat_id, "text": msg or "empty log"}).encode()
                  req = urllib.request.Request(
                      f"https://api.telegram.org/bot{token}/sendMessage",
                      data=data,
                      headers={"Content-Type": "application/json"}
                  )
                  urllib.request.urlopen(req)
              except Exception as e:
                  print(f"Telegram error: {e}")
          PYEOF

      - name: Notify start
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Oracle script started - Mumbai region. Will update every 5 mins." | python tg.py

      - name: Run script with live updates
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u main.py > output.log 2>&1 &
          SCRIPT_PID=$!

          while kill -0 $SCRIPT_PID 2>/dev/null; do
            sleep 300
            LINES=$(tail -10 launch_instance.log 2>/dev/null)
            if [ -n "$LINES" ]; then
              echo "$LINES" | python tg.py
            else
              LINES=$(tail -10 output.log 2>/dev/null)
              if [ -n "$LINES" ]; then
                echo "$LINES" | python tg.py
              else
                echo "Script PID $SCRIPT_PID alive - waiting for logs..." | python tg.py
              fi
            fi
          done

          wait $SCRIPT_PID || true

      - name: Final notification with IP
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Check INSTANCE_CREATED file (created by main.py on success)
          if [ -f "INSTANCE_CREATED" ]; then
            INSTANCE_INFO=$(cat INSTANCE_CREATED)
            python3 -c "
          import os, urllib.request, json
          token = os.environ['TELEGRAM_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          info = open('INSTANCE_CREATED').read()
          msg = '✅ Instance Created!\n\n' + info + '\nUsername: ubuntu\n\nUse the SSH key sent earlier to connect.'
          data = json.dumps({'chat_id': chat_id, 'text': msg}).encode()
          req = urllib.request.Request(
              f'https://api.telegram.org/bot{token}/sendMessage',
              data=data,
              headers={'Content-Type': 'application/json'}
          )
          urllib.request.urlopen(req)
            "
          elif grep -q "Out of host capacity\|Out of capacity" output.log 2>/dev/null; then
            echo "Out of capacity - retrying in 6 hours" | python tg.py
          else
            tail -20 output.log 2>/dev/null | python tg.py
          fi

      - name: Disable workflow if instance created
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "INSTANCE_CREATED" ]; then
            echo "Instance created — disabling workflow cron permanently..."
            curl -s -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/oracle.yml/disable"
            echo "Workflow disabled successfully."
          else
            echo "No instance created — keeping workflow active for next run."
          fi

      - name: Update summary
        if: always()
        run: |
          echo "## Script Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 output.log 2>/dev/null >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
